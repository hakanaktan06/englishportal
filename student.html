<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Portal - Öğrenci Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex h-[100dvh] overflow-hidden bg-slate-50 text-gray-800 font-sans">

    <aside class="w-20 md:w-64 flex-shrink-0 bg-gradient-to-b from-blue-700 to-indigo-800 text-white flex flex-col shadow-2xl z-20 h-[100dvh]">
        <div class="h-[73px] flex items-center justify-center md:justify-start md:p-6 border-b border-white/10">
            <span class="text-xl font-bold tracking-wide hidden md:block">English Portal</span>
            <span class="text-2xl font-black md:hidden">EP</span>
        </div>
        <nav class="flex-1 overflow-y-auto p-2 md:p-4 space-y-3 mt-2" style="-webkit-overflow-scrolling: touch;">
            
            <a href="#" id="btn-homeworks" class="menu-btn flex items-center justify-center md:justify-start p-3 bg-white/20 rounded-xl transition shadow-sm" title="Ödevlerim">
                <svg class="w-7 h-7 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                <span class="ml-3 font-medium text-sm hidden md:block">Ödevlerim</span>
            </a>

            <a href="#" id="btn-activities" class="menu-btn flex items-center justify-center md:justify-start p-3 hover:bg-white/10 rounded-xl transition" title="Etkinlikler">
                <svg class="w-7 h-7 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="ml-3 font-medium text-sm hidden md:block">Etkinlikler</span>
            </a>

            <a href="#" id="btn-quizzes" class="menu-btn flex items-center justify-center md:justify-start p-3 hover:bg-white/10 rounded-xl transition" title="Sınavlarım">
                <svg class="w-7 h-7 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                <span class="ml-3 font-medium text-sm hidden md:block">Sınavlarım</span>
            </a>

        </nav>
    </aside>

    <main class="flex-1 h-[100dvh] overflow-y-auto relative w-full" style="-webkit-overflow-scrolling: touch;">
        
        <header class="bg-white/90 backdrop-blur-md border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-30 h-[73px]">
            <div class="flex items-center">
                <h2 class="text-sm md:text-base font-black text-gray-800 uppercase tracking-tighter">Öğrenci Portalı</h2>
            </div>
            <div class="flex items-center gap-3">
                <span id="studentNameDisplay" class="hidden sm:block text-xs font-bold text-gray-500 uppercase tracking-widest">Yükleniyor...</span>
                
                <button id="studentLogoutBtn" class="flex items-center gap-2 bg-red-50 hover:bg-red-500 text-red-600 hover:text-white px-4 py-2.5 rounded-xl text-xs font-black transition-all border border-red-100 shadow-sm active:scale-95">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span class="hidden xs:inline">ÇIKIŞ</span>
                </button>
            </div>
        </header>

        <div id="section-homeworks" class="page-section w-full p-5 lg:p-8 pb-20">
            <h3 class="text-lg font-bold text-gray-800 mb-6 border-b-2 border-blue-500 inline-block pb-1">Bana Verilen Ödevler</h3>
            <div id="myHomeworksList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
        </div>

        <div id="section-activities" class="page-section w-full p-5 lg:p-8 hidden pb-20">
            <h3 class="text-lg font-bold text-gray-800 mb-6 border-b-2 border-purple-500 inline-block pb-1">Eğlence ve Kütüphane</h3>
            <div id="myActivitiesList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
        </div>

        <div id="section-quizzes" class="page-section w-full p-5 lg:p-8 hidden pb-20">
            <h3 class="text-lg font-bold text-gray-800 mb-6 border-b-2 border-red-500 inline-block pb-1">Çözülecek Sınavlar</h3>
            <div id="myQuizzesList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
        </div>
    </main>

    <div id="quizTakingModal" class="fixed inset-0 bg-slate-900/95 z-50 hidden flex flex-col overflow-hidden backdrop-blur-sm">
        <header class="bg-slate-800 text-white p-4 flex justify-between items-center shadow-md shrink-0">
            <div>
                <h3 id="takingQuizTitle" class="text-lg font-bold text-cyan-400">Sınav</h3>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Dikkatlice okuyun.</p>
            </div>
            <button onclick="closeQuizModal()" class="text-gray-300 hover:text-white hover:bg-red-500 px-4 py-2 rounded-lg text-sm font-bold transition">Sınavdan Çık</button>
        </header>
        <div class="flex-1 overflow-y-auto p-4 bg-slate-100/50 flex justify-center" style="-webkit-overflow-scrolling: touch;">
            <div class="w-full max-w-3xl bg-white p-6 md:p-8 rounded-2xl shadow-xl h-fit my-4">
                <form id="quizForm" class="space-y-8">
                    <div id="questionsContainer" class="space-y-6"></div>
                    <div class="pt-6 border-t border-gray-100">
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm py-4 rounded-xl shadow-md transition">SINAVI BİTİR VE GÖNDER</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="analysisModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="max-w-4xl w-full bg-white rounded-2xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            <header class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                <div>
                    <h3 class="text-xl font-bold text-gray-800">Sınav Analizi</h3>
                    <p class="text-xs text-gray-500 mt-1">Doğru ve yanlışlarını incele.</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <div class="text-[10px] font-bold text-gray-400 uppercase">PUANIN</div>
                        <div class="text-3xl font-black text-blue-600" id="analysisScoreDisplay">100</div>
                    </div>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-6" id="analysisDetailsContainer" style="-webkit-overflow-scrolling: touch;"></div>
            <div class="p-4 bg-white border-t border-gray-100 shrink-0">
                <button onclick="closeAnalysisModal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold text-sm py-3 rounded-xl transition">ANALİZİ KAPAT VE ANA SAYFAYA DÖN</button>
            </div>
        </div>
    </div>

    <div id="homeworkSubmitModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-xl overflow-hidden relative flex flex-col max-h-[90vh]">
            <header class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                <div>
                    <h3 class="text-base font-bold text-gray-800">Ödevi Teslim Et</h3>
                    <p class="text-[10px] text-blue-500 font-bold uppercase mt-0.5 tracking-wider truncate max-w-[200px]" id="submitHwTitle">Ödev Adı</p>
                </div>
                <button onclick="closeHomeworkModal()" class="text-2xl text-gray-400 hover:text-red-500">&times;</button>
            </header>
            <div class="p-5 overflow-y-auto flex-1" style="-webkit-overflow-scrolling: touch;">
                <form id="homeworkSubmitForm" class="space-y-4">
                    <input type="hidden" id="submitHwId">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-2 uppercase tracking-wider">Öğretmenine Not Bırak (İsteğe Bağlı)</label>
                        <textarea id="submitHwNote" rows="3" class="w-full p-3 rounded-xl border border-gray-200 focus:border-blue-500 outline-none text-sm resize-none" placeholder="Örn: 2. sayfayı çok kolay buldum..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm transition">BİTİRDİM, GÖNDER</button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <script src="student.js"></script>
</body>
</html>
