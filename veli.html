<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelişim Raporu - English Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overscroll-behavior-y: none; touch-action: pan-y; }
    </style>
</head>
<body class="text-gray-800 antialiased h-[100dvh] flex flex-col">

    <div id="loadingScreen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
        <p class="text-sm font-bold text-indigo-500 animate-pulse uppercase tracking-widest">Kayıtlar Çekiliyor</p>
    </div>

    <header class="bg-white border-b border-gray-200 p-5 sticky top-0 z-30 shrink-0 text-center shadow-sm">
        <h1 class="text-xl font-black text-indigo-900 tracking-tighter">ENGLISH PORTAL</h1>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Canlı Veli Bilgilendirme Sistemi</p>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8" id="mainContent" style="display: none; -webkit-overflow-scrolling: touch;">
        <div class="max-w-3xl mx-auto space-y-6 pb-10">
            
            <div class="bg-gradient-to-r from-indigo-600 to-blue-600 rounded-3xl p-6 md:p-8 text-white shadow-xl relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 opacity-10"><svg class="w-40 h-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></div>
                <p class="text-indigo-100 text-xs font-bold uppercase tracking-widest mb-1 relative z-10">Öğrenci Profili</p>
                <h2 class="text-3xl md:text-4xl font-black relative z-10" id="veliStudentName">Öğrenci Adı</h2>
                
                <div id="veliDebtBadge" class="mt-6 bg-white/20 backdrop-blur-sm border border-white/30 rounded-2xl p-4 inline-block relative z-10 hidden">
                    <p class="text-[10px] font-bold text-indigo-50 uppercase tracking-widest mb-0.5">Bekleyen Ders Ücreti</p>
                    <p class="text-2xl font-black" id="veliDebtText">0 TL</p>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-5 md:p-6 shadow-sm border border-gray-100">
                <h3 class="font-black text-gray-800 mb-4 flex items-center gap-2"><span>📈</span> Sınav Gelişim Grafiği</h3>
                <div class="w-full h-48 md:h-64 relative">
                    <canvas id="veliChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-5 md:p-6 shadow-sm border border-gray-100">
                <h3 class="font-black text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-50 pb-3"><span>📚</span> İşlenen Dersler (Seanslar)</h3>
                <div id="veliLessonList" class="space-y-4">
                    </div>
            </div>

        </div>
    </main>

    <div id="errorScreen" class="hidden flex-1 flex flex-col items-center justify-center p-6 text-center">
        <span class="text-6xl mb-4">⚠️</span>
        <h2 class="text-xl font-black text-gray-800 mb-2">Öğrenci Bulunamadı</h2>
        <p class="text-gray-500 font-medium">Lütfen linkin doğru kopyalandığından emin olun veya öğretmeninizden yeni bir link isteyin.</p>
    </div>

    <script src="veli.js"></script>
</body>
</html>
