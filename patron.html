<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>God Panel - English Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-gray-100 flex h-[100dvh] overflow-hidden selection:bg-amber-500/30 relative">

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/80 z-40 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

    <aside id="mainSidebar" class="w-64 bg-black border-r border-slate-800 flex flex-col shadow-2xl fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 z-50 h-[100dvh]">
        <div class="p-4 md:p-6 border-b border-slate-800 flex justify-between items-center bg-gradient-to-b from-slate-900 to-black">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-amber-500 uppercase">GOD PANEL</h1>
                <p class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Süper Admin</p>
            </div>
            <button id="closeSidebarBtn" class="md:hidden text-slate-500 hover:text-white text-4xl leading-none">&times;</button>
            <svg class="hidden md:block w-6 h-6 text-amber-500/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="#" class="flex items-center p-3 bg-amber-500/10 text-amber-500 border border-amber-500/20 rounded-xl transition font-bold text-sm shadow-inner group">
                <svg class="w-5 h-5 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Eğitmen Yönetimi
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button id="godLogoutBtn" class="w-full flex items-center justify-center gap-2 bg-rose-500/10 hover:bg-rose-500 text-rose-500 hover:text-white px-4 py-4 md:py-3 rounded-xl text-sm md:text-xs font-black transition-all border border-rose-500/20 group">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                SİSTEMDEN ÇIK
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden bg-gradient-to-br from-slate-900 to-slate-950 w-full">
        <header class="bg-black/50 backdrop-blur-md border-b border-slate-800 p-4 md:p-6 flex justify-between items-center sticky top-0 z-10 w-full">
            <div class="flex items-center gap-3">
                <button id="openSidebarBtn" class="md:hidden text-amber-500 focus:outline-none">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h2 class="text-lg md:text-xl font-black text-white tracking-tight flex items-center gap-2">
                    Hoş Geldin, <span class="text-amber-500">Patron</span>
                </h2>
            </div>
            <div class="hidden sm:block bg-amber-500/10 text-amber-500 px-4 py-2 rounded-lg text-xs font-black border border-amber-500/20 tracking-widest shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                BÜTÜN YETKİLER AKTİF
            </div>
        </header>

        <div class="p-4 md:p-6 lg:p-8 flex-1 overflow-y-auto w-full max-w-7xl mx-auto" style="-webkit-overflow-scrolling: touch;">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-6 md:mb-8">
                <div class="bg-slate-900 border border-slate-800 p-5 md:p-6 rounded-[20px] shadow-lg flex justify-between items-center relative overflow-hidden group hover:border-amber-500/30 transition">
                    <div class="absolute -right-4 -bottom-4 text-slate-800 pointer-events-none group-hover:scale-110 transition-transform">
                        <svg class="w-24 h-24 md:w-32 md:h-32" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    </div>
                    <div class="relative z-10">
                        <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Toplam Eğitmen</p>
                        <h3 class="text-4xl md:text-5xl font-black text-white" id="statTotalTeachers">0</h3>
                    </div>
                </div>
                
                <div class="bg-slate-900 border border-slate-800 p-5 md:p-6 rounded-[20px] shadow-lg flex justify-between items-center relative overflow-hidden group hover:border-blue-500/30 transition">
                    <div class="absolute -right-4 -bottom-4 text-slate-800 pointer-events-none group-hover:scale-110 transition-transform">
                        <svg class="w-24 h-24 md:w-32 md:h-32" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </div>
                    <div class="relative z-10">
                        <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Toplam Öğrenci</p>
                        <h3 class="text-4xl md:text-5xl font-black text-blue-400" id="statTotalStudents">0</h3>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-[20px] shadow-xl overflow-hidden">
                <div class="p-4 md:p-6 border-b border-slate-800 flex justify-between items-center bg-black/20">
                    <h3 class="text-base md:text-lg font-black text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Kayıtlı Öğretmen Listesi
                    </h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap min-w-[700px]">
                        <thead>
                            <tr class="bg-slate-950 text-slate-400 text-[10px] md:text-xs uppercase tracking-widest border-b border-slate-800">
                                <th class="p-3 md:p-4 font-bold">Eğitmen Adı</th>
                                <th class="p-3 md:p-4 font-bold text-center">Öğrenci</th>
                                <th class="p-3 md:p-4 font-bold text-center">Abonelik</th>
                                <th class="p-3 md:p-4 font-bold text-right">İşlem (Kasa / Sil)</th>
                            </tr>
                        </thead>
                        <tbody id="teachersList" class="divide-y divide-slate-800/50">
                            <tr><td colspan="4" class="p-10 text-center text-slate-500 font-bold animate-pulse">Sistem taranıyor...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="customConfirmModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-[9999] p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300" id="customConfirmBox">
            <div class="p-6 text-center">
                <div class="w-16 h-16 bg-amber-500/10 text-amber-500 border border-amber-500/20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h3 class="text-xl font-black text-white mb-2">Emin misin Patron?</h3>
                <p class="text-sm text-slate-400 font-medium" id="customConfirmMessage">Bu işlemi yapmak istediğine emin misin?</p>
            </div>
            <div class="flex border-t border-slate-800">
                <button id="customConfirmCancel" class="flex-1 py-4 text-slate-400 font-bold hover:bg-slate-800 transition border-r border-slate-800">İptal</button>
                <button id="customConfirmOk" class="flex-1 py-4 text-amber-500 font-black hover:bg-amber-500/10 transition">Evet, Onayla</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <script src="patron.js"></script>
</body>
</html>
